name: Akrep Derle
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Bağımlılıkları Yükle
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            git \
            python3-dev \
            ffmpeg \
            libsdl2-dev \
            libsdl2-image-dev \
            libsdl2-mixer-dev \
            libsdl2-ttf-dev \
            libportmidi-dev \
            libswscale-dev \
            libavformat-dev \
            libavcodec-dev \
            zlib1g-dev \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base-apps \
            libgstreamer-plugins-base1.0-dev
          pip install --upgrade pip
          pip install buildozer cython==0.29.33

      - name: APK Derle
        run: yes | buildozer android debug
        
      - name: APK Dosyasını Yükle
        uses: actions/upload-artifact@v4
        with:
          name: Akrep-APK
          path: bin/*.apk
          
