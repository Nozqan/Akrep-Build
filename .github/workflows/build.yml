name: Akrep Derle
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Java 17 Kurulumu
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Python 3.10 Kurulumu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Sistem Bagimliliklarini Yukle
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3-dev ffmpeg libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base-apps libgstreamer-plugins-base1.0-dev autoconf automake libtool m4 gettext
          pip install --upgrade pip
          pip install "cython<3.0" buildozer

      - name: APK Paketle
        run: |
          export BUILDOZER_ALLOW_ORG_NAME_AS_PROJECT_NAME=1
          buildozer android debug --brief
        
      - name: APK Dosyasini Yukle
        uses: actions/upload-artifact@v4
        with:
          name: Akrep-APK
          path: bin/*.apk
          
